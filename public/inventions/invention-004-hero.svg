<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="50%" stop-color="#141b33"/>
      <stop offset="100%" stop-color="#1a2852"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e676" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#40c4ff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e676"/>
      <stop offset="100%" stop-color="#69f0ae"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="rgba(0,230,118,0.04)" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(60,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(120,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(180,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(240,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(300,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(360,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(420,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(480,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(540,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(600,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(660,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(720,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(780,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(840,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(900,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(960,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(1020,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(1080,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" transform="translate(1140,0)"/>
    <line x1="0" y1="0" x2="1200" y2="0" transform="translate(0,60)"/>
    <line x1="0" y1="0" x2="1200" y2="0" transform="translate(0,120)"/>
    <line x1="0" y1="0" x2="1200" y2="0" transform="translate(0,180)"/>
    <line x1="0" y1="0" x2="1200" y2="0" transform="translate(0,240)"/>
    <line x1="0" y1="0" x2="1200" y2="0" transform="translate(0,300)"/>
    <line x1="0" y1="0" x2="1200" y2="0" transform="translate(0,360)"/>
    <line x1="0" y1="0" x2="1200" y2="0" transform="translate(0,420)"/>
    <line x1="0" y1="0" x2="1200" y2="0" transform="translate(0,480)"/>
    <line x1="0" y1="0" x2="1200" y2="0" transform="translate(0,540)"/>
    <line x1="0" y1="0" x2="1200" y2="0" transform="translate(0,600)"/>
  </g>

  <!-- Glow orbs -->
  <circle cx="300" cy="300" r="200" fill="rgba(0,230,118,0.06)" filter="url(#blur1)"/>
  <circle cx="900" cy="350" r="150" fill="rgba(64,196,255,0.04)" filter="url(#blur1)"/>

  <!-- Drone body (helium balloon + motors) -->
  <g transform="translate(600, 220)">
    <!-- Helium balloon -->
    <ellipse cx="0" cy="-60" rx="55" ry="45" fill="rgba(0,230,118,0.08)" stroke="rgba(0,230,118,0.3)" stroke-width="1.5"/>
    <text x="0" y="-55" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(0,230,118,0.6)">He</text>

    <!-- Tether lines -->
    <line x1="-30" y1="-20" x2="-30" y2="10" stroke="rgba(0,230,118,0.2)" stroke-width="1"/>
    <line x1="30" y1="-20" x2="30" y2="10" stroke="rgba(0,230,118,0.2)" stroke-width="1"/>

    <!-- Central body -->
    <rect x="-25" y="10" width="50" height="30" rx="6" fill="rgba(20,27,51,0.9)" stroke="rgba(0,230,118,0.3)" stroke-width="1"/>

    <!-- Camera eye -->
    <circle cx="0" cy="25" r="6" fill="rgba(64,196,255,0.3)" stroke="rgba(64,196,255,0.6)" stroke-width="1"/>
    <circle cx="0" cy="25" r="2" fill="rgba(64,196,255,0.8)"/>

    <!-- Motor arms -->
    <line x1="-25" y1="20" x2="-55" y2="10" stroke="rgba(0,230,118,0.2)" stroke-width="1.5"/>
    <line x1="25" y1="20" x2="55" y2="10" stroke="rgba(0,230,118,0.2)" stroke-width="1.5"/>
    <line x1="-25" y1="30" x2="-55" y2="40" stroke="rgba(0,230,118,0.2)" stroke-width="1.5"/>
    <line x1="25" y1="30" x2="55" y2="40" stroke="rgba(0,230,118,0.2)" stroke-width="1.5"/>

    <!-- Motors (ducted fans) -->
    <circle cx="-55" cy="10" r="12" fill="none" stroke="rgba(0,230,118,0.4)" stroke-width="1.5"/>
    <circle cx="55" cy="10" r="12" fill="none" stroke="rgba(0,230,118,0.4)" stroke-width="1.5"/>
    <circle cx="-55" cy="40" r="12" fill="none" stroke="rgba(0,230,118,0.4)" stroke-width="1.5"/>
    <circle cx="55" cy="40" r="12" fill="none" stroke="rgba(0,230,118,0.4)" stroke-width="1.5"/>

    <!-- Propeller blur -->
    <circle cx="-55" cy="10" r="10" fill="rgba(0,230,118,0.06)"/>
    <circle cx="55" cy="10" r="10" fill="rgba(0,230,118,0.06)"/>
    <circle cx="-55" cy="40" r="10" fill="rgba(0,230,118,0.06)"/>
    <circle cx="55" cy="40" r="10" fill="rgba(0,230,118,0.06)"/>

    <!-- Projection beam -->
    <polygon points="-8,40 -30,100 30,100 8,40" fill="rgba(0,230,118,0.04)" stroke="rgba(0,230,118,0.1)" stroke-width="0.5"/>
  </g>

  <!-- Home Core Hub -->
  <g transform="translate(200, 420)">
    <rect x="0" y="0" width="160" height="90" rx="8" fill="rgba(20,27,51,0.9)" stroke="rgba(0,230,118,0.2)" stroke-width="1"/>
    <text x="80" y="30" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(0,230,118,0.8)">HOME CORE HUB</text>
    <text x="80" y="50" text-anchor="middle" font-family="sans-serif" font-size="11" fill="rgba(232,234,246,0.6)">算力中枢</text>
    <!-- Status LEDs -->
    <circle cx="20" cy="70" r="4" fill="#00e676"/>
    <circle cx="35" cy="70" r="4" fill="#00e676"/>
    <circle cx="50" cy="70" r="4" fill="#40c4ff"/>
    <text x="80" y="75" font-family="monospace" font-size="9" fill="rgba(232,234,246,0.3)">i5 + RTX4060Ti</text>
  </g>

  <!-- NAS -->
  <g transform="translate(200, 530)">
    <rect x="0" y="0" width="160" height="60" rx="6" fill="rgba(20,27,51,0.9)" stroke="rgba(64,196,255,0.2)" stroke-width="1"/>
    <text x="80" y="25" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(64,196,255,0.8)">NAS STORAGE</text>
    <text x="80" y="45" text-anchor="middle" font-family="sans-serif" font-size="11" fill="rgba(232,234,246,0.5)">32TB RAID5</text>
  </g>

  <!-- Smart Home Devices -->
  <g transform="translate(800, 430)">
    <rect x="0" y="0" width="200" height="160" rx="8" fill="rgba(20,27,51,0.6)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    <text x="100" y="25" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(232,234,246,0.5)">SMART HOME</text>

    <!-- Light -->
    <circle cx="40" cy="60" r="12" fill="rgba(255,213,79,0.1)" stroke="rgba(255,213,79,0.3)" stroke-width="1"/>
    <text x="40" y="65" text-anchor="middle" font-size="12">💡</text>

    <!-- AC -->
    <circle cx="100" cy="60" r="12" fill="rgba(64,196,255,0.1)" stroke="rgba(64,196,255,0.3)" stroke-width="1"/>
    <text x="100" y="65" text-anchor="middle" font-size="12">❄️</text>

    <!-- Curtain -->
    <circle cx="160" cy="60" r="12" fill="rgba(0,230,118,0.1)" stroke="rgba(0,230,118,0.3)" stroke-width="1"/>
    <text x="160" y="65" text-anchor="middle" font-size="12">🪟</text>

    <!-- ESP32 -->
    <rect x="30" y="95" width="140" height="45" rx="4" fill="rgba(20,27,51,0.9)" stroke="rgba(0,230,118,0.15)" stroke-width="1"/>
    <text x="100" y="115" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(0,230,118,0.6)">ESP32 OLED</text>
    <text x="100" y="130" text-anchor="middle" font-size="9" fill="rgba(232,234,246,0.3)">桌面仪表盘</text>
  </g>

  <!-- Charging stations -->
  <g transform="translate(500, 480)">
    <circle cx="0" cy="0" r="18" fill="rgba(0,230,118,0.06)" stroke="rgba(0,230,118,0.2)" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-size="14">⚡</text>
    <text x="0" y="30" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(0,230,118,0.4)">CHARGE</text>
  </g>
  <g transform="translate(700, 500)">
    <circle cx="0" cy="0" r="18" fill="rgba(0,230,118,0.06)" stroke="rgba(0,230,118,0.2)" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-size="14">⚡</text>
    <text x="0" y="30" text-anchor="middle" font-family="monospace" font-size="8" fill="rgba(0,230,118,0.4)">CHARGE</text>
  </g>

  <!-- Data flow arrows -->
  <g stroke="rgba(0,230,118,0.15)" stroke-width="1" fill="none" stroke-dasharray="4,4">
    <path d="M 600 290 Q 400 350 280 420"/>
    <path d="M 600 290 Q 700 350 800 430"/>
    <path d="M 280 510 L 280 530"/>
  </g>

  <!-- Connection labels -->
  <g font-family="monospace" font-size="8" fill="rgba(0,230,118,0.3)">
    <text x="380" y="360">WiFi6 AES-256</text>
    <text x="680" y="360">Matter</text>
  </g>

  <!-- Title text -->
  <text x="600" y="560" text-anchor="middle" font-family="Orbitron, monospace" font-size="24" fill="url(#green)" font-weight="700" letter-spacing="4">PHASE B</text>
  <text x="600" y="590" text-anchor="middle" font-family="sans-serif" font-size="14" fill="rgba(232,234,246,0.5)" letter-spacing="6">家庭私有AI算力中枢 · 浮空全域感知飞行器</text>

  <!-- Version tag -->
  <rect x="520" y="605" width="160" height="20" rx="10" fill="rgba(0,230,118,0.08)" stroke="rgba(0,230,118,0.15)" stroke-width="0.5"/>
  <text x="600" y="619" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(0,230,118,0.5)" letter-spacing="2">REVISED · 2026.07</text>
</svg>
